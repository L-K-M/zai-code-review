name: "Z.ai Code Review"
description: "AI-powered code review using Z.ai models"
inputs:
  ZAI_API_KEY:
    description: "Z.ai API key"
    required: true
  ZAI_MODEL:
    description: "Z.ai AI model"
    required: false
    default: "glm-4.7"
  ZAI_SYSTEM_PROMPT:
    description: "Custom system prompt for the AI reviewer"
    required: false
    default: "You are an expert code reviewer. Review the provided code changes and give clear, actionable feedback. When you have a high-confidence inline replacement for code that appears in the diff, emit it as [[suggestion:path:<file path>:line:<new file line>:<short summary>:<replacement code>]]."
  ZAI_REVIEWER_NAME:
    description: "Name shown in the review comment header"
    required: false
    default: "Z.ai Code Review"
  EXCLUDE_PATTERNS:
    description: "Comma-separated file patterns to exclude from review (for example '*.lock,dist/**,*.min.js')"
    required: false
    default: "*.lock,package-lock.json,yarn.lock,pnpm-lock.yaml"
  MAX_DIFF_CHARS:
    description: "Maximum total diff characters sent to the API (0 = unlimited)"
    required: false
    default: "0"
  ZAI_THREAD_SIMILARITY_THRESHOLD:
    description: "Similarity threshold (0-1) for matching existing comment threads (default: 0.6)"
    required: false
    default: "0.6"
  ZAI_COMMIT_FEEDBACK:
    description: "Deprecated compatibility input; feedback files are no longer committed by the action"
    required: false
    default: "false"
  GITHUB_TOKEN:
    description: "GitHub token for API access"
    required: false
    default: ${{ github.token }}
runs:
  using: "node24"
  main: "dist/index.js"
branding:
  icon: "check-circle"
  color: "gray-dark"
